<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Prime Kozmetik | Yönetim</title><style>body{margin:0;background:#09090c;color:#fff;font-family:Arial;padding:20px}.wrap{max-width:1200px;margin:auto}h1,h2{color:#f4dfae}.bar{display:flex;gap:10px;flex-wrap:wrap;margin:15px 0}button,select,input{padding:11px 14px;border:0;border-radius:10px;font-weight:700}.gold{background:#d9b66f}.card{background:#17171d;border:1px solid #493f2b;border-radius:16px;padding:16px;margin:12px 0}.muted{color:#aaa}.items{margin:10px 0;padding:10px;background:#0f0f13;border-radius:10px}.orderItem{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid #2b2b33}.orderImg{width:64px;height:64px;object-fit:contain;background:#fff;border-radius:10px}.status{background:#fff;color:#111}.hide{display:none}.wheelPanel{display:grid;grid-template-columns:1fr auto;gap:10px}.wheelPanel select{background:#fff;color:#111}@media(max-width:650px){.wheelPanel{grid-template-columns:1fr}}</style></head><body><div class="wrap"><h1>Prime Kozmetik Yönetim</h1><div id="login"><button class="gold" onclick="loginGoogle()">Google ile Giriş Yap</button></div><div id="panel" class="hide"><div class="bar"><span id="who"></span><button onclick="logoutUser()">Çıkış</button><button class="gold" onclick="loadAll()">Yenile</button></div><div class="card"><h2>🎡 Müşteriye Çark Gönder</h2><p class="muted">Sipariş veren müşterilerden birini seç.</p><div class="wheelPanel"><select id="customerSelect"><option value="">Müşteri seç</option></select><button class="gold" onclick="sendWheel()">Çark Gönder</button></div><div id="wheelMsg" class="muted"></div></div><div id="orders"></div></div></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script>
const db=supabase.createClient('https://omuwvdhjleovljatkzun.supabase.co','sb_publishable_eJBVTmsWv7l0tdLx11m7BQ_KIiHaWzs');let user=null,orderRows=[];const ADMIN='ozbagbaris3@gmail.com';
async function loginGoogle(){await db.auth.signInWithOAuth({provider:'google',options:{redirectTo:location.href}})}async function logoutUser(){await db.auth.signOut();location.reload()}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}function money(n){return new Intl.NumberFormat('tr-TR',{style:'currency',currency:'TRY'}).format(Number(n)||0)}
async function init(){const {data}=await db.auth.getSession();user=data.session?.user;if(!user)return;if((user.email||'').toLowerCase()!==ADMIN){alert('Bu hesap yönetici değil.');return}login.classList.add('hide');panel.classList.remove('hide');who.textContent=user.email;loadAll()}
async function loadAll(){await loadOrders();loadCustomers()}
function loadCustomers(){const m=new Map();orderRows.forEach(o=>{if(o.user_id)m.set(o.user_id,{id:o.user_id,name:o.customer_name||o.email||o.phone,email:o.email||'',phone:o.phone||''})});customerSelect.innerHTML='<option value="">Müşteri seç</option>'+[...m.values()].map(x=>`<option value="${esc(x.id)}">${esc(x.name)}${x.phone?' — '+esc(x.phone):''}</option>`).join('')}
async function sendWheel(){const id=customerSelect.value;if(!id)return wheelMsg.textContent='Önce müşteri seç.';const {error}=await db.from('wheel_assignments').insert({user_id:id,status:'pending',sent_by:user.id});wheelMsg.textContent=error?'Hata: '+error.message:'✅ Çark müşteriye gönderildi.'}
async function loadOrders(){orders.innerHTML='Yükleniyor...';const [{data,error},{data:productRows}]=await Promise.all([db.from('orders').select('*').order('created_at',{ascending:false}),db.from('products').select('id,image')]);if(error){orders.innerHTML='<div class="card">Hata: '+esc(error.message)+'</div>';return}orderRows=data||[];const imgs=Object.fromEntries((productRows||[]).map(p=>[String(p.id),p.image]));orders.innerHTML=orderRows.map(o=>`<div class="card"><b>Sipariş #${esc(o.order_no)}</b><div class="muted">${new Date(o.created_at).toLocaleString('tr-TR')}</div><p><b>${esc(o.customer_name)}</b> · ${esc(o.phone)} · ${esc(o.email)}</p><p>📍 ${esc(o.address_snapshot?.city)} / ${esc(o.address_snapshot?.district)} — ${esc(o.address_snapshot?.neighborhood)} ${esc(o.address_snapshot?.full_address)}</p><div class="items">${(o.items||[]).map(i=>{const img=i.image||imgs[String(i.product_id)]||'';return `<div class="orderItem">${img?`<img class="orderImg" src="${esc(img)}">`:''}<div><b>${esc(i.name)}</b><div class="muted">${i.quantity} adet · ${money(Number(i.price)*Number(i.quantity))}</div></div></div>`}).join('')}</div><b>Toplam: ${money(o.total)}</b><div class="bar"><select class="status" id="s_${o.id}">${['Yeni Sipariş','Onaylandı','Hazırlanıyor','Kargoya Verildi','Tamamlandı','İptal Edildi'].map(x=>`<option ${x===o.status?'selected':''}>${x}</option>`).join('')}</select><button class="gold" onclick="setStatus('${o.id}')">Durumu Kaydet</button></div></div>`).join('')||'<div class="card">Sipariş yok.</div>'}
async function setStatus(id){const status=document.getElementById('s_'+id).value;const {error}=await db.from('orders').update({status}).eq('id',id);alert(error?error.message:'Sipariş durumu güncellendi.')}init();</script></body></html>
