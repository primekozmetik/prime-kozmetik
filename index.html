<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#111116"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><link rel="manifest" href="manifest.webmanifest"><title>Prime Kozmetik | Güncel Fiyat Listesi</title>

<style>
:root{
  --gold:#d8b36a;--gold2:#f3dda9;--bg:#09090b;--panel:#15151a;--panel2:#1c1c22;
  --text:#fffaf0;--muted:#bdb6aa;--line:rgba(216,179,106,.24);--danger:#ff9ca5;
  --green:#25D366;--shadow:0 14px 40px rgba(0,0,0,.35)
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;background:
  radial-gradient(circle at top right,rgba(216,179,106,.12),transparent 34%),
  linear-gradient(180deg,#09090b,#111116 45%,#0d0d11);
  color:var(--text);font-family:Arial,Helvetica,sans-serif;min-height:100vh;
  -webkit-font-smoothing:antialiased;padding-bottom:96px
}
button,input,select{font:inherit}
button{-webkit-tap-highlight-color:transparent}
.wrap{max-width:1180px;margin:auto;padding:16px}
.hero{
  position:sticky;top:0;z-index:8;
  border:1px solid var(--line);background:rgba(14,14,18,.92);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-radius:22px;padding:18px;margin-bottom:14px;box-shadow:var(--shadow)
}
.heroTop{display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{font:700 26px Georgia,serif;color:var(--gold2);letter-spacing:3px}
.subtitle{color:var(--muted);font-size:13px;margin-top:4px}
.tools{display:grid;grid-template-columns:1fr 180px;gap:10px;margin-top:15px}
.tools input,.tools select{
  width:100%;padding:14px 15px;border:1px solid var(--line);border-radius:14px;
  background:#fff;color:#111;outline:none;min-height:48px
}
.cats{
  display:flex;gap:9px;overflow-x:auto;margin:0 0 14px;padding:2px 2px 8px;
  scrollbar-width:none;position:sticky;top:126px;z-index:7;
  background:linear-gradient(180deg,rgba(9,9,11,.96),rgba(9,9,11,.83),transparent)
}
.cats::-webkit-scrollbar{display:none}
.cat{
  flex:0 0 auto;white-space:nowrap;border:1px solid var(--line);background:var(--panel);
  color:var(--muted);padding:11px 15px;border-radius:999px;cursor:pointer;min-height:44px
}
.cat.on{background:var(--gold);color:#17120a;font-weight:900}
.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:15px}
.card{
  background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);
  border-radius:20px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 8px 25px rgba(0,0,0,.22)
}
.pic{
  aspect-ratio:1/1;background:#f4f4f2;display:flex;align-items:center;justify-content:center;
  font-size:44px;color:var(--gold2);overflow:hidden
}
.pic img{width:100%;height:100%;object-fit:contain;background:#fff}
.content{padding:14px;display:flex;flex-direction:column;gap:8px;flex:1}
.brand{font-size:11px;letter-spacing:1.4px;color:var(--gold2);font-weight:900;text-transform:uppercase}
.name{font-weight:900;line-height:1.3;font-size:15px;min-height:39px}
.desc{color:var(--muted);font-size:13px;line-height:1.42;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.price{font-size:22px;color:var(--gold2);font-weight:900;margin-top:2px}
.stock{font-size:12px;color:#94e0ad}
.add{
  margin-top:auto;background:var(--gold);color:#17120a;border:0;border-radius:12px;
  padding:13px;font-weight:900;cursor:pointer;min-height:46px
}
.add:active{transform:scale(.99)}
.cartBtn{
  position:fixed;left:14px;right:14px;bottom:14px;z-index:14;
  background:linear-gradient(135deg,var(--gold2),var(--gold));color:#17120a;border:0;
  border-radius:16px;padding:15px 18px;font-weight:900;box-shadow:0 12px 40px #000;
  display:flex;justify-content:space-between;align-items:center;min-height:56px
}
.drawer{
  position:fixed;inset:0;z-index:30;background:rgba(0,0,0,.72);display:none;
  align-items:flex-end;justify-content:center
}
.drawer.open{display:flex}
.cart{
  width:min(620px,100%);max-height:88vh;background:#111116;padding:18px;
  overflow:auto;border:1px solid var(--line);border-radius:24px 24px 0 0;
  box-shadow:0 -20px 60px rgba(0,0,0,.5)
}
.cartTop{display:flex;justify-content:space-between;align-items:center;position:sticky;top:-18px;background:#111116;padding:8px 0 10px;z-index:2}
.close{background:#2b2b33;color:#fff;border:0;border-radius:11px;padding:11px 14px}
.cartItem{
  display:grid;grid-template-columns:1fr auto;gap:10px;background:#1b1b21;
  padding:12px;border-radius:14px;margin:10px 0;border:1px solid rgba(255,255,255,.04)
}
.qty{display:flex;align-items:center;gap:9px;margin-top:10px}
.qty button,.remove{border:0;border-radius:9px;padding:8px 11px;cursor:pointer;min-width:38px;min-height:38px}
.qty button{background:#303039;color:#fff}
.remove{background:#4a2025;color:#ffd7dd}
.total{font-size:22px;font-weight:900;color:var(--gold2);padding:14px 0}
.wa{width:100%;border:0;border-radius:13px;background:var(--green);color:#071f0f;padding:15px;font-weight:900;cursor:pointer;min-height:50px}
.empty{text-align:center;color:var(--muted);padding:42px 16px;grid-column:1/-1}
.installBtn{
  border:1px solid var(--line);background:#1b1b21;color:var(--gold2);
  border-radius:12px;padding:10px 12px;font-weight:800;display:none
}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:560px){
  .wrap{padding:10px}
  .hero{padding:14px;border-radius:18px}
  .logo{font-size:21px;letter-spacing:2px}
  .subtitle{font-size:12px}
  .tools{grid-template-columns:1fr}
  .tools input,.tools select{min-height:46px}
  .cats{top:118px}
  .grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
  .card{border-radius:16px}
  .content{padding:11px;gap:7px}
  .brand{font-size:10px}
  .name{font-size:13px;min-height:34px}
  .desc{font-size:12px;-webkit-line-clamp:2}
  .price{font-size:18px}
  .stock{font-size:11px}
  .add{padding:11px 8px;font-size:13px}
  .cartBtn{left:10px;right:10px;bottom:10px}
}
@media(max-width:380px){
  .grid{grid-template-columns:1fr}
  .name{font-size:15px}
}
</style>
</head>
<body>
<div class="wrap">
<section class="hero"><div class="heroTop"><div><div class="logo">PRIME KOZMETİK</div><div class="subtitle">Güncel fiyat listesi • Orijinal ürünler • Kolay sipariş</div></div><button id="installBtn" class="installBtn">Uygulamayı Yükle</button></div>
<div class="tools"><input id="search" placeholder="Ürün veya marka ara..." oninput="render()"><select id="sort" onchange="render()"><option value="">Sıralama</option><option value="low">Fiyat: Artan</option><option value="high">Fiyat: Azalan</option><option value="name">İsme göre</option></select></div></section>
<div id="cats" class="cats"></div><main id="grid" class="grid"><div class="empty">Ürünler yükleniyor…</div></main>
</div>
<button class="cartBtn" onclick="openCart()"><span>🛒 Sepetim</span><span><span id="count">0</span> ürün</span></button>
<div id="drawer" class="drawer" onclick="if(event.target===this)closeCart()"><aside class="cart"><div class="cartTop"><h2>Sepetim</h2><button class="close" onclick="closeCart()">Kapat</button></div><div id="cartItems"></div><div id="total" class="total"></div><button class="wa" onclick="sendWhatsApp()">Sepeti WhatsApp'tan Gönder</button></aside></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script>
window.PRIME_CONFIG = {
  SUPABASE_URL: "https://omuwvdhjleovljatkzun.supabase.co",
  SUPABASE_ANON_KEY: "sb_publishable_eJBVTmsWv7l0tdLx11m7BQ_KIiHaWzs",
  WHATSAPP: "905348223436"
};
</script>
<script>
let db,products=[],cart=JSON.parse(localStorage.getItem("primeCart")||"{}"),active="Tümü";
const cfg=window.PRIME_CONFIG||{};
function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}
function money(n){return new Intl.NumberFormat("tr-TR",{style:"currency",currency:"TRY"}).format(Number(n)||0)}
async function init(){
 if(!cfg.SUPABASE_URL||cfg.SUPABASE_URL.includes("BURAYA")){grid.innerHTML='<div class="empty">Bağlantı ayarları yapılmamış.</div>';return}
 db=supabase.createClient(cfg.SUPABASE_URL,cfg.SUPABASE_ANON_KEY);await load();
 db.channel("public-products").on("postgres_changes",{event:"*",schema:"public",table:"products"},load).subscribe();
 setInterval(load,15000);
}
async function load(){const {data,error}=await db.from("products").select("*").order("created_at",{ascending:false});if(error){grid.innerHTML='<div class="empty">Ürünler alınamadı.</div>';return}products=data||[];render()}
function render(){
 const q=search.value.toLowerCase().trim(),s=sort.value;
 const categories=["Tümü",...new Set(products.map(p=>p.category))];
 cats.innerHTML=categories.map(c=>`<button class="cat ${c===active?'on':''}" onclick="active=${JSON.stringify(c)};render()">${esc(c)}</button>`).join("");
 let list=products.filter(p=>(active==="Tümü"||p.category===active)&&(`${p.brand} ${p.name} ${p.description} ${p.category}`).toLowerCase().includes(q));
 if(s==="low")list.sort((a,b)=>a.price-b.price);if(s==="high")list.sort((a,b)=>b.price-a.price);if(s==="name")list.sort((a,b)=>a.name.localeCompare(b.name,"tr"));
 grid.innerHTML=list.length?list.map(p=>`<article class="card"><div class="pic">${p.image?`<img src="${esc(p.image)}" alt="${esc(p.name)}">`:"✦"}</div><div class="content"><div class="brand">${esc(p.brand)}</div><div class="name">${esc(p.name)}</div><div class="desc">${esc(p.description)}</div><div class="price">${money(p.price)}</div><div class="stock">● ${esc(p.stock||"Stokta")}</div><button class="add" onclick="addCart(${p.id})">Sepete Ekle</button></div></article>`).join(""):'<div class="empty">Ürün bulunamadı.</div>';
 renderCart();
}
function addCart(id){cart[id]=(cart[id]||0)+1;saveCart();openCart()}
function changeQty(id,d){cart[id]=(cart[id]||0)+d;if(cart[id]<=0)delete cart[id];saveCart()}
function removeItem(id){delete cart[id];saveCart()}
function saveCart(){localStorage.setItem("primeCart",JSON.stringify(cart));renderCart()}
function renderCart(){
 let total=0,count=0,html="";
 Object.entries(cart).forEach(([id,qty])=>{const p=products.find(x=>x.id===Number(id));if(!p)return;total+=Number(p.price)*qty;count+=qty;html+=`<div class="cartItem"><div><b>${esc(p.brand)} ${esc(p.name)}</b><div class="muted">${money(p.price)} × ${qty}</div><div class="qty"><button onclick="changeQty(${id},-1)">−</button><b>${qty}</b><button onclick="changeQty(${id},1)">+</button></div></div><button class="remove" onclick="removeItem(${id})">Sil</button></div>`});
 cartItems.innerHTML=html||'<div class="empty">Sepetiniz boş.</div>';document.getElementById("total").textContent="Toplam: "+money(total);countEl=document.getElementById("count");countEl.textContent=count;
}
function openCart(){drawer.classList.add("open");renderCart()}function closeCart(){drawer.classList.remove("open")}
function sendWhatsApp(){
 const lines=["Merhaba, aşağıdaki ürünleri sipariş vermek istiyorum:",""];let total=0,has=false;
 Object.entries(cart).forEach(([id,qty])=>{const p=products.find(x=>x.id===Number(id));if(!p)return;has=true;const t=Number(p.price)*qty;total+=t;lines.push(`• ${p.brand} ${p.name} — ${qty} adet — ${money(t)}`)});
 if(!has)return alert("Sepetiniz boş.");lines.push("",`Toplam: ${money(total)}`,"","Stok ve teslimat bilgisini paylaşabilir misiniz?");
 window.open(`https://wa.me/${cfg.WHATSAPP}?text=${encodeURIComponent(lines.join("\\n"))}`,"_blank");
}
init();renderCart();
</script>
<script>
let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",(e)=>{
  e.preventDefault();deferredPrompt=e;
  const b=document.getElementById("installBtn");if(b)b.style.display="block";
});
document.getElementById("installBtn")?.addEventListener("click",async()=>{
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt=null;
  document.getElementById("installBtn").style.display="none";
});
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
</script>

</body></html>
